name: 部署到 Firebase Hosting

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Check secret exists
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}" ]; then
            echo "❌ 错误：GitHub Secret FIREBASE_SERVICE_ACCOUNT_KEY 未设置"
            echo "请到仓库 Settings → Secrets and variables → Actions 添加"
            exit 1
          fi
          echo "✅ Secret 已找到"

      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}' > /tmp/sa-key.json

      - name: Deploy
        run: firebase deploy --project testing-record-673c7
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
